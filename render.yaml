# Render Blueprint — deploys backend (FastAPI) + frontend (Vite static)
# Docs: https://render.com/docs/blueprint-spec
#
# After first deploy, verify the backend URL Render assigned. If it differs from
# `ewaste-backend.onrender.com`, update the rewrite `destination` below and
# redeploy the frontend.

services:
  - type: web
    name: ewaste-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: ENABLE_CLIP_FALLBACK
        value: "1"
      - key: CLIP_MODEL_NAME
        value: "siglip"
      - key: TRANSFORMERS_OFFLINE
        value: "0"

  - type: web
    name: ewaste-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
    routes:
      - type: rewrite
        source: /api/*
        destination: https://ewaste-backend-ykwh.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
